name: Build RuinaCompatMod

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Install Gradle 7.6
        run: |
          wget -q https://services.gradle.org/distributions/gradle-7.6-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-7.6/bin" >> $GITHUB_PATH

      - name: Check libs folder
        run: |
          echo "=== libs/ contents ==="
          ls -la libs/
          echo "=== src/ structure ==="
          find src/ -name "*.java" | sort

      - name: Build
        run: gradle jar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RuinaCompatMod
          path: output/RuinaCompatMod.jar
          retention-days: 90
